<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="author" content="Sascha Baumeister" />
		<meta name="dcterms.rightsHolder" content="Ali Hinnawe" />
		<meta name="dcterms.rights" content="all rights reserved" />
		<meta name="dcterms.dateCopyrighted" content="2024" />

		<title>Poker-App</title>
		<link type="image/png" rel="icon" href="image/poker.jpg" />
		<link type="text/css" rel="stylesheet" href="style/general.css" />
		<link type="text/css" rel="stylesheet" href="style/authentication.css" />
		<link type="text/css" rel="stylesheet" href="style/preferences.css" />
		<link type="text/css" rel="stylesheet" href="style/server-editor.css" />
		<script type="module" async="true" src="script/authentication-tab-controller.js"></script>
		<script type="module" async="true" src="script/preferences-tab-controller.js"></script>
		<script type="module" async="true" src="script/poker-tab-controller.js"></script>
		
		<template class="poker-table-view">
			<section class="poker-table-view">
			
				<div class="data"></div>
				
				<div class="control">
					<button type="button" class="quit">quit</button>
				</div>				
			</section>
		</template>
		
		<template class="authentication">
			<section class="authentication">
				<fieldset class="credentials">
					<legend>Authentifizierung</legend>
					<div class="email">
						<label>Email</label>
						<input type="email" />
					</div>
					<div class="password">
						<label>Passwort</label>
						<input type="password" />
					</div>
					<div class="control">
						<button type="button" class="authenticate">login</button>
					</div>
				</fieldset>
			</section>
		</template>

		<template class="preferences">
			<section class="preferences">
				<div class="avatar">
					<label>Avatar</label>
					<button type="button">
						<img ondragover="event.preventDefault()" ondrop="event.preventDefault()" width = "50px" height = "50px"/>
					</button>
					<input type="file" class="hidden" accept="image/*" />
				</div>
				<div class="credentials">
					<div class="email">
						<label>Email</label>
						<input type="email" />
					</div>
					<div class="password">
						<label>Passwort</label>
						<input type="password" />
					</div>
					<div class="credit">
						<label>Kredit</label>
						<input type="text" readonly="true" />
					</div>
					<div class="group">
						<label>Gruppe</label>
						<select autocomplete="off">
							<option value="USER">Benutzer</option>
							<option value="CROUPIER">Croupier</option>
							<option value="ADMIN">Administrator</option>
						</select>
					</div>
				</div>
				<div class="personal">
					<span class="name">
						<div class="title">
							<label>Titel</label>
							<input type="text" />
						</div>
						<div class="surname">
							<label>Nachname</label>
							<input type="text" />
						</div>
						<div class="forename">
							<label>Vorname</label>
							<input type="text" />
						</div>
					</span>
					<span class="address">
						<div class="postcode">
							<label>PLZ</label>
							<input type="text" />
						</div>
						<div class="street">
							<label>Straße</label>
							<input type="text" />
						</div>
						<div class="city">
							<label>Ort</label>
							<input type="text" />
						</div>
						<div class="country">
							<label>Staat</label>
							<input type="text" />
						</div>
					</span>
				</div>
				<fieldset class="phones">
					<legend>Telefon</legend>
					<span></span>
					<button type="button" class="add">hinzufügen</button>
				</fieldset>
				<div class="control">
					<button type="button" class="submit">speichern</button>
				</div>
			</section>
		</template>
		
		<template class="poker-tables-view">
			<section class="poker-tables-view">
				<div class="main">
					<h1>Poker Tische</h1>
					<div class="tables">
						<table>
							<tbody></tbody>
						</table>
					</div>
					<div class="control hidden">
					
						<div>
							<label>Name</label>
							<input type="text" class="alias"></select>
						</div>
						<div>
							<label>Variante</label>
							<select class="variant"></select>
						</div>
						<div >
							<label>Mindesgebot (€)</label>
							<input type="number" class="entry-bid" value = "0" min="0" />
						</div>
						
						<div >
							<label>Sitzanzahl</label>
							<input type="number" class="seat-count" value="2" min="1" max="7" />
						</div>
	
						<button type="button" class="create">neu</button>	
					</div>	
				</div>


				
			</section>
		</template>

		<template class="poker-tables-view-row">
			<tr>
				<td class = "table"><button type="button"><img ondragover="event.preventDefault()" ondrop="event.preventDefault()" button></td>
				<td class = "alias text"></td>
				<td class = "variant text"></td>
			</tr>
		</template>	
		
	</head>

	<body>
		<header>
			<nav class="tabs">
				<button type="button" class="authentication">Login</button>
				<button type="button" class="preferences">Einstellungen</button>
				<button type="button" class="poker">Poker</button>
			</nav>
			<img class="logo" src="image/logo.png" />
		</header>

		<main>
			<article class="left hidden"></article>
			<article class="center"></article>
			<article class="right hidden"></article>
		</main>

		<footer>
			<label>Nachricht</label>
			<input type="text" class="message" readonly="true" />
		</footer>
	</body>
</html>
